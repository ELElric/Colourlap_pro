[pytest]
minversion = 8.0
testpaths = tests
pythonpath = src
addopts = -ra --strict-markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require DB / filesystem)
    ui: UI tests (require display, use pytest-qt)
    slow: Slow tests (skip on default run)
filterwarnings =
    ignore::DeprecationWarning:colour\..*