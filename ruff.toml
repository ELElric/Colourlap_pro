line-length = 100
target-version = "py310"

[lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "DTZ", "PT", "Q"]
ignore = [
    "E501",  # line-too-long (handled by formatter)
    "B008",  # function call in default argument (common in Pydantic)
]

[lint.per-file-ignores]
"tests/**" = ["B011"]
"src/colorlab_pro/ui/web_demo.py" = ["E402", "N802"]
"tests/unit/ui/test_spectrum_page.py" = ["E402"]

[format]
quote-style = "double"
indent-style = "space"