<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spectrum Page - Improved UI Mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #1e1e1e; color: #e0e0e0; padding: 16px; font-size: 13px; }

  /* Header */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .page-title { color: #4fc3f7; font-size: 18px; font-weight: bold; }
  .header-actions { display: flex; gap: 8px; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 12px; padding: 12px; background: #252526; border: 1px solid #444; border-radius: 6px; margin-bottom: 12px; }
  .toolbar-left { display: flex; align-items: center; gap: 8px; flex: 1; }
  .toolbar-right { display: flex; align-items: center; gap: 8px; }

  /* Search & Filter */
  .search-box { display: flex; align-items: center; gap: 6px; background: #1e1e1e; border: 1px solid #555; border-radius: 4px; padding: 6px 10px; min-width: 200px; }
  .search-box input { background: transparent; border: none; color: #e0e0e0; outline: none; width: 100%; font-size: 12px; }
  .search-box input::placeholder { color: #666; }
  .search-icon { color: #888; font-size: 14px; }

  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-label { color: #999; font-size: 11px; }
  .filter-select { background: #1e1e1e; border: 1px solid #555; border-radius: 4px; padding: 4px 8px; color: #e0e0e0; font-size: 11px; min-width: 80px; }

  /* Buttons */
  .btn { padding: 6px 14px; border-radius: 4px; font-size: 12px; cursor: pointer; border: 1px solid transparent; display: flex; align-items: center; gap: 4px; }
  .btn-primary { background: #0078d4; color: white; border-color: #0078d4; }
  .btn-primary:hover { background: #1a8ae8; }
  .btn-secondary { background: #3c3c3c; color: #e0e0e0; border-color: #555; }
  .btn-secondary:hover { background: #4a4a4a; }
  .btn-danger { background: #a02020; color: white; border-color: #a02020; opacity: 0.5; cursor: not-allowed; }
  .btn-danger.active { opacity: 1; cursor: pointer; }
  .btn-danger.active:hover { background: #c03030; }
  .btn-icon { padding: 6px 8px; }

  /* Main Content */
  .main-content { display: flex; gap: 12px; height: calc(100vh - 180px); min-height: 500px; }

  /* Left Panel - Table */
  .left-panel { flex: 1.2; display: flex; flex-direction: column; background: #252526; border: 1px solid #444; border-radius: 6px; overflow: hidden; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #444; }
  .panel-title { color: #4fc3f7; font-weight: bold; font-size: 13px; }
  .panel-count { color: #888; font-size: 11px; }

  .table-container { flex: 1; overflow: auto; }
  .spectrum-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .spectrum-table thead { position: sticky; top: 0; z-index: 1; }
  .spectrum-table th { background: #2d2d2d; color: #4fc3f7; padding: 8px 10px; text-align: left; font-weight: normal; border-bottom: 2px solid #444; white-space: nowrap; }
  .spectrum-table th:first-child { width: 32px; text-align: center; }
  .spectrum-table td { padding: 8px 10px; border-bottom: 1px solid #333; }
  .spectrum-table tr:hover { background: #2a2a3e; }
  .spectrum-table tr.selected { background: #1a3a5c; }

  .row-checkbox { width: 16px; height: 16px; accent-color: #4fc3f7; }
  .row-name { color: #e0e0e0; font-weight: 500; }
  .row-badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; }
  .badge-led { background: #3a3a2a; color: #ffd700; border: 1px solid #555500; }
  .badge-cf { background: #2a3a3a; color: #4fc3f7; border: 1px solid #005555; }
  .badge-qd { background: #3a2a3a; color: #e040e0; border: 1px solid #550055; }

  .channel-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; min-width: 24px; text-align: center; }
  .channel-r { background: #4a2020; color: #ff6666; }
  .channel-g { background: #204a20; color: #66ff66; }
  .channel-b { background: #20204a; color: #6666ff; }
  .channel-w { background: #3a3a3a; color: #ffffff; }

  .row-value { color: #b0b0b0; font-family: 'Consolas', monospace; font-size: 11px; }
  .row-date { color: #888; font-size: 11px; }

  /* Right Panel - Preview */
  .right-panel { flex: 1; display: flex; flex-direction: column; gap: 12px; }

  .chart-panel { flex: 1; background: #252526; border: 1px solid #444; border-radius: 6px; display: flex; flex-direction: column; min-height: 300px; }
  .chart-tabs { display: flex; border-bottom: 1px solid #444; }
  .chart-tab { padding: 10px 16px; color: #888; cursor: pointer; font-size: 12px; border-bottom: 2px solid transparent; }
  .chart-tab.active { color: #fff; border-bottom-color: #0078d4; }
  .chart-tab:hover { color: #e0e0e0; }
  .chart-area { flex: 1; background: #1a1a1a; margin: 8px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #555; font-size: 12px; }

  /* Info Cards */
  .info-panel { background: #252526; border: 1px solid #444; border-radius: 6px; padding: 12px; }
  .info-title { color: #4fc3f7; font-weight: bold; font-size: 13px; margin-bottom: 10px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .info-card { background: #1e1e1e; border: 1px solid #333; border-radius: 4px; padding: 10px; }
  .info-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .info-card-icon { width: 8px; height: 8px; border-radius: 50%; }
  .info-card-label { color: #888; font-size: 11px; }
  .info-card-value { color: #e0e0e0; font-size: 16px; font-weight: 500; font-family: 'Consolas', monospace; }
  .info-card-unit { color: #666; font-size: 11px; margin-left: 4px; }

  /* Color indicator dots */
  .color-xy { background: #4fc3f7; }
  .color-uv { background: #81d4fa; }
  .color-peak { background: #ffd700; }
  .color-fwhm { background: #ff8a65; }
  .color-dom { background: #e040e0; }
  .color-purity { background: #66bb6a; }

  /* Status Bar */
  .status-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #252526; border: 1px solid #444; border-radius: 6px; margin-top: 12px; }
  .status-left { color: #888; font-size: 11px; }
  .status-right { display: flex; gap: 12px; }
  .status-item { color: #666; font-size: 11px; }

  /* Tooltip */
  .tooltip { position: relative; }
  .tooltip::after { content: attr(data-tooltip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #3c3c3c; color: #e0e0e0; padding: 4px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap; opacity: 0; visibility: hidden; transition: all 0.2s; }
  .tooltip:hover::after { opacity: 1; visibility: visible; }

  /* Empty State */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #666; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 14px; margin-bottom: 6px; }
  .empty-hint { font-size: 12px; color: #555; }

  /* Change Indicator */
  .change-badge { display: inline-block; background: #264f78; color: #4fc3f7; padding: 2px 6px; border-radius: 3px; font-size: 10px; margin-left: 8px; }
</style>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>

<!-- Page Header -->
<div class="page-header">
  <div class="page-title">Spectrum Page</div>
  <div class="header-actions">
    <button class="btn btn-secondary">⚙ Settings</button>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-left">
    <!-- Search -->
    <div class="search-box">
      <span class="search-icon">Q</span>
      <input type="text" id="search-input" placeholder="Search spectra by name..." oninput="filterSpectra()" />
    </div>

    <!-- Filters -->
    <div class="filter-group">
      <span class="filter-label">Category:</span>
      <select class="filter-select" id="category-filter" onchange="filterSpectra()">
        <option value="">All</option>
        <option value="LED">LED</option>
        <option value="CF">CF</option>
        <option value="QD">QD</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Channel:</span>
      <select class="filter-select" id="channel-filter" onchange="filterSpectra()">
        <option value="">All</option>
        <option value="R">R</option>
        <option value="G">G</option>
        <option value="B">B</option>
        <option value="W">W</option>
      </select>
    </div>
  </div>

  <div class="toolbar-right">
    <button class="btn btn-primary" onclick="importSpectra()">Import</button>
    <button class="btn btn-secondary" onclick="exportSelected()">Export</button>
    <button class="btn btn-danger tooltip" id="delete-btn" data-tooltip="Select spectra first to delete" onclick="deleteSelected()">Delete</button>
  </div>
</div>

<!-- Main Content -->
<div class="main-content">
  <!-- Left Panel - Spectrum Table -->
  <div class="left-panel">
    <div class="panel-header">
      <div class="panel-title">Spectrum List</div>
      <div class="panel-count" id="spectrum-count">0 spectra</div>
    </div>
    <div class="table-container">
      <table class="spectrum-table">
        <thead>
          <tr>
            <th><input type="checkbox" class="row-checkbox" id="select-all" onclick="toggleSelectAll()" /></th>
            <th>Name</th>
            <th>Category</th>
            <th>Channel</th>
            <th>Peak (nm)</th>
            <th>FWHM (nm)</th>
            <th>Thickness (μm)</th>
          </tr>
        </thead>
        <tbody id="spectrum-table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <!-- Chart Panel -->
    <div class="chart-panel">
      <div class="chart-tabs">
        <div class="chart-tab active">Original</div>
        <div class="chart-tab">Normalized</div>
      </div>
      <div id="spectrum-chart" style="width:100%;height:100%;"></div>
    </div>

    <!-- Info Panel -->
    <div class="info-panel">
      <div class="info-title">Spectrum Info <span class="change-badge">2 selected</span></div>
      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-header">
            <div class="info-card-icon color-xy"></div>
            <span class="info-card-label">CIE 1931 xy</span>
          </div>
          <div class="info-card-value" id="info-xy">-</div>
        </div>
        <div class="info-card">
          <div class="info-card-header">
            <div class="info-card-icon color-uv"></div>
            <span class="info-card-label">CIE 1976 u'v'</span>
          </div>
          <div class="info-card-value" id="info-uv">-</div>
        </div>
        <div class="info-card">
          <div class="info-card-header">
            <div class="info-card-icon color-peak"></div>
            <span class="info-card-label">Peak Wavelength</span>
          </div>
          <div class="info-card-value" id="info-peak">-<span class="info-card-unit">nm</span></div>
        </div>
        <div class="info-card">
          <div class="info-card-header">
            <div class="info-card-icon color-fwhm"></div>
            <span class="info-card-label">FWHM</span>
          </div>
          <div class="info-card-value" id="info-fwhm">-<span class="info-card-unit">nm</span></div>
        </div>
        <div class="info-card">
          <div class="info-card-header">
            <div class="info-card-icon color-dom"></div>
            <span class="info-card-label">Dominant λ</span>
          </div>
          <div class="info-card-value" id="info-dom">-<span class="info-card-unit">nm</span></div>
        </div>
        <div class="info-card">
          <div class="info-card-header">
            <div class="info-card-icon color-purity"></div>
            <span class="info-card-label">Purity</span>
          </div>
          <div class="info-card-value" id="info-purity">-<span class="info-card-unit">%</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <div class="status-left">Ready</div>
  <div class="status-right">
    <span class="status-item" id="status-total">Total: 0 spectra</span>
    <span class="status-item" id="status-selected">Selected: 0</span>
    <span class="status-item" id="status-last">Last import: -</span>
  </div>
</div>


<script src="echarts.min.js"></script>
<script>
var allSpectra = [];
var selectedIds = new Set();
var spectrumChart = null;

function renderSpectra(spectra) {
    allSpectra = spectra || [];
    renderSpectraTable(allSpectra);
    renderSpectrumChart(allSpectra, selectedIds);
    updateStatus();
}

function renderSpectraTable(spectra) {
    var tbody = document.getElementById('spectrum-table-body');
    if (!tbody) return;
    tbody.innerHTML = '';
    if (!spectra || spectra.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#666;padding:12px;">No spectra match</td></tr>';
        return;
    }
    var html = '';
    spectra.forEach(function(s) {
        var isSelected = selectedIds.has(s.id);
        var catClass = s.category === 'LED' ? 'badge-led' : (s.category === 'CF' ? 'badge-cf' : 'badge-qd');
        var chClass = s.channel === 'R' ? 'channel-r' : (s.channel === 'G' ? 'channel-g' : (s.channel === 'B' ? 'channel-b' : 'channel-w'));
        html += '<tr class="' + (isSelected ? 'selected' : '') + '" data-id="' + s.id + '" onclick="toggleRowSelection(' + s.id + ')">' +
            '<td onclick="event.stopPropagation()"><input type="checkbox" class="row-checkbox" ' + (isSelected ? 'checked' : '') + ' onchange="toggleRowSelection(' + s.id + ')"></td>' +
            '<td><span class="row-name">' + escapeHtml(s.name) + '</span></td>' +
            '<td><span class="row-badge ' + catClass + '">' + escapeHtml(s.category || '-') + '</span></td>' +
            '<td><span class="channel-tag ' + chClass + '">' + escapeHtml(s.channel || '-') + '</span></td>' +
            '<td class="row-value">' + s.peak_nm + '</td>' +
            '<td class="row-value">' + s.fwhm_nm + '</td>' +
            '<td class="row-value">' + s.thickness_um + '</td>' +
            '</tr>';
    });
    tbody.innerHTML = html;
}

function escapeHtml(text) {
    if (text === undefined || text === null) return '';
    return String(text).replace(/[&<>"']/g, function(m) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
    });
}

function filterSpectra() {
    var query = document.getElementById('search-input').value.toLowerCase();
    var cat = document.getElementById('category-filter').value;
    var ch = document.getElementById('channel-filter').value;
    var filtered = allSpectra.filter(function(s) {
        var nameMatch = (s.name || '').toLowerCase().indexOf(query) !== -1;
        var catMatch = !cat || (s.category || '').toLowerCase() === cat.toLowerCase();
        var chMatch = !ch || (s.channel || '').toUpperCase() === ch.toUpperCase();
        return nameMatch && catMatch && chMatch;
    });
    renderSpectraTable(filtered);
}

function toggleSelectAll() {
    var cb = document.getElementById('select-all');
    var checked = cb.checked;
    var filtered = getFilteredSpectra();
    filtered.forEach(function(s) {
        if (checked) selectedIds.add(s.id);
        else selectedIds.delete(s.id);
    });
    renderSpectraTable(filtered);
    updateInfoCards();
    updateStatus();
}

function toggleRowSelection(id) {
    if (selectedIds.has(id)) selectedIds.delete(id);
    else selectedIds.add(id);
    renderSpectraTable(getFilteredSpectra());
    updateInfoCards();
    updateStatus();
}

function getFilteredSpectra() {
    var query = document.getElementById('search-input').value.toLowerCase();
    var cat = document.getElementById('category-filter').value;
    var ch = document.getElementById('channel-filter').value;
    return allSpectra.filter(function(s) {
        var nameMatch = (s.name || '').toLowerCase().indexOf(query) !== -1;
        var catMatch = !cat || (s.category || '').toLowerCase() === cat.toLowerCase();
        var chMatch = !ch || (s.channel || '').toUpperCase() === ch.toUpperCase();
        return nameMatch && catMatch && chMatch;
    });
}

function updateInfoCards() {
    var ids = Array.from(selectedIds);
    var elXY = document.getElementById('info-xy');
    var elUV = document.getElementById('info-uv');
    var elPeak = document.getElementById('info-peak');
    var elFwhm = document.getElementById('info-fwhm');
    var elDom = document.getElementById('info-dom');
    var elPurity = document.getElementById('info-purity');

    if (ids.length !== 1) {
        var label = ids.length === 0 ? '-' : '(' + ids.length + ' selected)';
        elXY.textContent = label;
        elUV.textContent = label;
        elPeak.innerHTML = '-<span class="info-card-unit">nm</span>';
        elFwhm.innerHTML = '-<span class="info-card-unit">nm</span>';
        elDom.innerHTML = '-<span class="info-card-unit">nm</span>';
        elPurity.innerHTML = '-<span class="info-card-unit">%</span>';
        return;
    }
    var s = allSpectra.find(function(x) { return x.id === ids[0]; });
    if (!s) return;
    // Compute xy/uv from sample data points if enough
    if (s.data && s.data.length >= 3) {
        var approx = approximateColorimetry(s.data);
        elXY.textContent = approx.xy || '-';
        elUV.textContent = approx.uv || '-';
        elDom.innerHTML = (approx.dom || '-') + '<span class="info-card-unit">nm</span>';
        elPurity.innerHTML = (approx.purity || '-') + '<span class="info-card-unit">%</span>';
    } else {
        elXY.textContent = '-';
        elUV.textContent = '-';
        elDom.innerHTML = '-<span class="info-card-unit">nm</span>';
        elPurity.innerHTML = '-<span class="info-card-unit">%</span>';
    }
    elPeak.innerHTML = s.peak_nm + '<span class="info-card-unit">nm</span>';
    elFwhm.innerHTML = s.fwhm_nm + '<span class="info-card-unit">nm</span>';
}

function approximateColorimetry(points) {
    // Very lightweight approximations for preview only
    var peak = points.reduce(function(acc, p) { return p[1] > acc[1] ? p : acc; }, points[0]);
    var total = points.reduce(function(sum, p) { return sum + p[1]; }, 0);
    if (total === 0) return {};
    var centroid = points.reduce(function(acc, p) { return [acc[0] + p[0] * p[1], acc[1] + p[1]]; }, [0, 0]);
    var dom = (centroid[0] / centroid[1]).toFixed(1);
    var xy = (0.35 + (centroid[0] / centroid[1] - 550) * 0.0002).toFixed(4) + ', ' +
             (0.35 + (peak[0] - 550) * 0.0001).toFixed(4);
    var uv = (0.20 + (centroid[0] / centroid[1] - 550) * 0.0001).toFixed(4) + ', ' +
             (0.50 + (peak[0] - 550) * 0.00005).toFixed(4);
    var purity = Math.min(99.9, peak[1] / (total / points.length) * 25).toFixed(1);
    return { xy: xy, uv: uv, dom: dom, purity: purity };
}

function updateStatus() {
    var countEl = document.getElementById('spectrum-count');
    var totalEl = document.getElementById('status-total');
    var selectedEl = document.getElementById('status-selected');
    if (countEl) countEl.textContent = allSpectra.length + ' spectra';
    if (totalEl) totalEl.textContent = 'Total: ' + allSpectra.length + ' spectra';
    if (selectedEl) selectedEl.textContent = 'Selected: ' + selectedIds.size;
    var badge = document.querySelector('.change-badge');
    if (badge) badge.textContent = selectedIds.size + ' selected';
    var delBtn = document.getElementById('delete-btn');
    if (delBtn) delBtn.classList.toggle('active', selectedIds.size > 0);
}

function renderSpectrumChart(spectra, selectedIds) {
    var dom = document.getElementById('spectrum-chart');
    if (!dom) return;
    if (!spectrumChart) spectrumChart = echarts.init(dom, 'dark');
    var selected = (spectra || []).filter(function(s) { return selectedIds.has(s.id); });
    var toPlot = selected.length > 0 ? selected : spectra.slice(0, 5);
    var series = toPlot.map(function(s) {
        return { name: s.name, type: 'line', smooth: true, showSymbol: false, data: s.data || [] };
    });
    var option = {
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis' },
        legend: { data: toPlot.map(function(s) { return s.name; }), textStyle: { color: '#ccc' }, bottom: 0 },
        grid: { top: 30, right: 20, bottom: 40, left: 50 },
        xAxis: { type: 'value', name: 'Wavelength (nm)', nameTextStyle: { color: '#aaa' }, axisLine: { lineStyle: { color: '#555' } }, splitLine: { lineStyle: { color: '#333' } } },
        yAxis: { type: 'value', name: 'Value', nameTextStyle: { color: '#aaa' }, axisLine: { lineStyle: { color: '#555' } }, splitLine: { lineStyle: { color: '#333' } } },
        series: series
    };
    spectrumChart.setOption(option, true);
}

function logStatus(msg) {
    var el = document.querySelector('.status-left');
    if (el) el.textContent = msg;
}

function importSpectra() {
    if (!window.backend) { logStatus('Backend not ready'); return; }
    window.backend.import_spectra(function(json) {
        var res = JSON.parse(json);
        if (res.error) { logStatus('Import failed: ' + res.error); return; }
        logStatus('Imported ' + (res.ids ? res.ids.length : 0) + ' spectra');
        refreshSpectra();
    });
}

function exportSelected() {
    if (selectedIds.size === 0) { logStatus('No spectra selected to export'); return; }
    if (!window.backend) { logStatus('Backend not ready'); return; }
    window.backend.export_selected(JSON.stringify(Array.from(selectedIds)), function(json) {
        var res = JSON.parse(json);
        if (res.error) { logStatus('Export failed: ' + res.error); return; }
        logStatus('Exported to ' + res.path);
    });
}

function deleteSelected() {
    if (selectedIds.size === 0) { logStatus('No spectra selected'); return; }
    if (!confirm('Delete ' + selectedIds.size + ' selected spectra?')) return;
    if (!window.backend) { logStatus('Backend not ready'); return; }
    window.backend.delete_spectra(JSON.stringify(Array.from(selectedIds)), function(json) {
        var res = JSON.parse(json);
        if (res.error) { logStatus('Delete failed: ' + res.error); return; }
        selectedIds.clear();
        logStatus('Deleted ' + res.deleted + ' spectra');
        refreshSpectra();
    });
}

function pasteSpectrum() {
    var text = prompt('Paste wavelength/value pairs (nm a.u.):');
    if (!text) return;
    var name = prompt('Spectrum name:', 'Pasted Spectrum');
    if (!window.backend) { logStatus('Backend not ready'); return; }
    window.backend.paste_spectrum(JSON.stringify({ text: text, name: name || 'Pasted Spectrum' }), function(json) {
        var res = JSON.parse(json);
        if (res.error) { logStatus('Paste failed: ' + res.error); return; }
        logStatus('Pasted spectrum ' + res.id);
        refreshSpectra();
    });
}

function refreshSpectra() {
    if (!window.backend) { logStatus('Backend not ready'); return; }
    window.backend.get_spectra(function(json) {
        var data = JSON.parse(json);
        if (data.error) { logStatus('Refresh failed: ' + data.error); return; }
        renderSpectra(data);
    });
}

// Expose a global helper so individual Paste buttons in other pages can call it
window.pasteSpectrum = pasteSpectrum;


</body>
</html>
